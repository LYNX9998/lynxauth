<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LYNX | Changelog</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-base: #000000;
            --bg-surface: #0a0a0a;
            --bg-sidebar: #010101;
            --bg-hover: #161616;
            
            --text-primary: #ededed;
            --text-secondary: #888888;
            --text-accent: #ffffff;
            
            --border-subtle: #222222;
            --border-hover: #333333;
            
            --primary: #6366f1;
            --blue: #3b82f6;

            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-code: 'JetBrains Mono', Consolas, Monaco, monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        ::-webkit-scrollbar { display: none; }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: var(--font-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* SIDEBAR */
        aside {
            width: 280px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-subtle);
            padding: 40px 0;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .brand {
            font-family: var(--font-main);
            font-weight: 700;
            font-size: 1.15rem;
            color: var(--text-accent);
            padding: 0 32px;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            text-decoration: none;
        }

        .nav-group { margin-bottom: 30px; }
        .nav-group-title {
            padding: 0 32px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .nav-item {
            padding: 8px 32px;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-item:hover, .nav-item.active {
            color: var(--text-accent);
            background: var(--bg-hover);
        }

        /* MAIN CONTENT */
        main {
            flex: 1;
            padding: 60px 80px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .container { max-width: 800px; margin: 0 auto; }

        .header { margin-bottom: 60px; }
        .header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 10px; }
        .header p { color: var(--text-secondary); font-size: 1.1rem; }

        .update-card {
            position: relative;
            padding-left: 40px;
            margin-bottom: 60px;
            border-left: 2px solid var(--border-subtle);
        }

        .update-card::before {
            content: '';
            position: absolute;
            left: -7px;
            top: 0;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
        }

        .update-date {
            font-family: var(--font-code);
            font-size: 0.75rem;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .update-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--text-accent);
        }

        .update-content {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.7;
            background: var(--bg-surface);
            padding: 24px;
            border-radius: 12px;
            border: 1px solid var(--border-subtle);
        }

        @media (max-width: 900px) {
            aside { display: none; }
            main { padding: 40px 24px; }
        }
    </style>
</head>
<body>

    <aside>
        <a href="index.html" class="brand">
            <i class="fa-solid fa-shield-cat"></i>
            LYNX AUTH
        </a>

        <div class="nav-group">
            <div class="nav-group-title">DISCOVERY</div>
            <div class="nav-item active">
                <i class="fa-solid fa-clock-rotate-left"></i> Patch History
            </div>
            <a href="docs.html" style="text-decoration:none;" class="nav-item">
                <i class="fa-solid fa-book"></i> Documentation
            </a>
        </div>

        <div class="nav-group">
            <div class="nav-group-title">EXTERNAL</div>
            <a href="https://discord.gg/Sz5ZGfk3GX" target="_blank" class="nav-item">
                <i class="fa-brands fa-discord"></i> Discord Server
            </a>
        </div>
    </aside>

    <main>
        <div class="container">
            <div class="header">
                <h1>Changelog</h1>
                <p>Public ledger of all system modifications and enhancements.</p>
            </div>

            <div id="updates-list">
                <div style="color:var(--text-secondary);">Syncing logs...</div>
            </div>
        </div>
    </main>

    <script>
        async function fetchUpdates() {
            const container = document.getElementById('updates-list');
            try {
                const response = await fetch('https://api.lynxauth.qzz.io/public/updates');
                const data = await response.json();

                if (data.status === 'success' && data.updates) {
                    container.innerHTML = '';
                    data.updates.forEach(u => {
                        const date = u.date ? u.date.split(' ')[0] : 'RECENT';
                        const card = document.createElement('div');
                        card.className = 'update-card';
                        card.innerHTML = `
                            <div class="update-date">${date}</div>
                            <div class="update-title">System Update</div>
                            <div class="update-content">
                                ${u.message}
                            </div>
                        `;
                        container.appendChild(card);
                    });
                } else {
                    container.innerHTML = '<div style="color:var(--text-secondary);">No updates found.</div>';
                }
            } catch (e) {
                container.innerHTML = '<div style="color:var(--danger);">Failed to connect to the discovery matrix.</div>';
            }
        }
        fetchUpdates();
    </script>
</body>
</html>
